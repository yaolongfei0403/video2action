<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>SAM-Body4D Studio · 4D 动作知识库系统</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/tw.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/modules.css">
</head>
<body>

    <!-- Top Navigation Bar -->
    <header class="app-header">
        <div style="display:flex; align-items:center; gap:24px;">
            <div class="logo" onclick="App.switchModule('dashboard')">
                <div class="logo-icon"><i class="fas fa-cube"></i></div>
                <div>
                    <h1>SAM-Body4D <span class="gradient">Studio</span></h1>
                    <p class="subtitle">4D 动作知识库系统</p>
                </div>
            </div>
            <div class="header-divider"></div>
            <div class="pipeline-steps" id="pipeline-steps">
                <div class="pipeline-step" data-step="video-import">
                    <span class="dot">1</span>
                    <span class="step-label">导入视频</span>
                </div>
                <div class="pipeline-step" data-step="rough-cut">
                    <span class="dot">2</span>
                    <span class="step-label">粗切片段</span>
                </div>
                <div class="pipeline-step" data-step="fine-cut">
                    <span class="dot">3</span>
                    <span class="step-label">精切片段</span>
                </div>
                <div class="pipeline-step" data-step="target">
                    <span class="dot">4</span>
                    <span class="step-label">目标选择</span>
                </div>
                <div class="pipeline-step" data-step="4d">
                    <span class="dot">5</span>
                    <span class="step-label">4D 重建</span>
                </div>
                <div class="pipeline-step" data-step="tagging">
                    <span class="dot">6</span>
                    <span class="step-label">标签生成</span>
                </div>
                <div class="pipeline-step" data-step="completed">
                    <span class="dot">7</span>
                    <span class="step-label">入库完成</span>
                </div>
            </div>
        </div>
        <div class="header-actions">
            <div id="backend-status">
                <span class="dot"></span><span>连接中…</span>
            </div>
            <div class="header-divider-v"></div>
            <div class="user-badge">
                <div class="user-avatar">A</div>
                <span class="user-name">admin</span>
            </div>
        </div>
    </header>

    <div class="app-body">
        <!-- Left Sidebar -->
        <aside class="app-sidebar">
            <div class="nav-section">
                <div class="nav-section-title">总览</div>
                <div class="nav-item active" data-module="dashboard">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </div>
                <div class="nav-item" data-module="task-center">
                    <i class="fas fa-tasks"></i>
                    <span>任务中心</span>
                    <span class="nav-badge" id="task-center-badge">-</span>
                </div>

                <div class="nav-section-title">处理工作流</div>
                <div class="nav-item" data-module="video-import">
                    <i class="fas fa-video"></i>
                    <span>视频接入</span>
                </div>
                <div class="nav-item" data-module="rough-cut">
                    <i class="fas fa-cut"></i>
                    <span>粗切工作台</span>
                </div>
                <div class="nav-item" data-module="fine-cut">
                    <i class="fas fa-scissors"></i>
                    <span>精切工作台</span>
                </div>
                <div class="nav-item" data-module="target">
                    <i class="fas fa-bullseye"></i>
                    <span>Target Studio</span>
                </div>
                <div class="nav-item" data-module="4d">
                    <i class="fas fa-cube"></i>
                    <span>4D Studio</span>
                </div>
                <div class="nav-item" data-module="tagging">
                    <i class="fas fa-tags"></i>
                    <span>标签生成</span>
                </div>

                <div class="nav-section-title">知识库</div>
                <div class="nav-item" data-module="asset-library">
                    <i class="fas fa-database"></i>
                    <span>动作资产库</span>
                </div>
                <div class="nav-item" data-module="semantic-search">
                    <i class="fas fa-search"></i>
                    <span>语义检索</span>
                    <span class="nav-dot"></span>
                </div>
            </div>
            <div class="sidebar-footer">
                <div><i class="fas fa-shield-halved" style="color:#10b981;"></i> v 2.4.1 · <span class="version">运行正常</span></div>
                <div style="margin-top:4px; font-size:10px; color:#4b5563;">© 2024 · 4D Action Knowledge Base</div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="app-main" id="main-content">
            <div id="module-root"></div>
        </main>
    </div>

    <!-- Toast stack -->
    <div class="toast-stack" id="toast-stack"></div>

    <!-- Error overlay (shows JS errors visibly) -->
    <div id="error-overlay"></div>
    <script>
      window.addEventListener('error', e => {
        const overlay = document.getElementById('error-overlay');
        if (overlay) {
          overlay.style.display = 'block';
          overlay.textContent = 'JS Error: ' + (e.error?.message || e.message) + '\n  at ' + (e.filename || '?') + ':' + e.lineno;
        }
        console.error('[uncaught]', e.error);
      });
      window.addEventListener('unhandledrejection', e => {
        const overlay = document.getElementById('error-overlay');
        if (overlay) {
          overlay.style.display = 'block';
          overlay.textContent = 'Promise Error: ' + (e.reason?.message || e.reason);
        }
        console.error('[unhandled]', e.reason);
      });
    </script>

    <!-- JS modules -->
    <script src="/js/api.js"></script>
    <script src="/js/state.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/modules/dashboard.js"></script>
    <script src="/js/modules/tasks.js"></script>
    <script src="/js/modules/video_import.js"></script>
    <script src="/js/modules/rough_cut.js"></script>
    <script src="/js/modules/fine_cut.js"></script>
    <script src="/js/modules/target.js"></script>
    <script src="/js/modules/fourd.js"></script>
    <script src="/js/modules/tagging.js"></script>
    <script src="/js/modules/assets.js"></script>
    <script src="/js/modules/search.js"></script>
    <script src="/js/modules/completed.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
